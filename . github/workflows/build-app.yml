name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Install dependencies
        run: npm install
      - name: Create assets
        run: |
          mkdir -p assets/fonts
          sudo apt-get install -y imagemagick
          convert -size 1024x1024 gradient:'#0d1f35-#070e1a' -gravity Center -fill '#c9a84c' -font DejaVu-Sans -pointsize 400 -annotate 0 "M" assets/icon.png
          convert -size 1024x1024 xc:'#070e1a' -gravity Center -fill '#c9a84c' -font DejaVu-Sans -pointsize 400 -annotate 0 "M" assets/adaptive-icon.png
          convert -size 1284x2778 gradient:'#0d1f35-#070e1a' -gravity Center -fill '#c9a84c' -font DejaVu-Sans -pointsize 120 -annotate 0 "MyAstrology" assets/splash.png
          convert -size 48x48 xc:'#c9a84c' assets/favicon.png
          curl -L "https://fonts.gstatic.com/s/notoserifbengali/v17/hYkuPvggTvnzteaV7WD65tCMunA6bJ1HIyDL-7M.ttf" -o assets/fonts/NotoSerifBengali-Regular.ttf
          cp assets/fonts/NotoSerifBengali-Regular.ttf assets/fonts/NotoSerifBengali-Bold.ttf
      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive
