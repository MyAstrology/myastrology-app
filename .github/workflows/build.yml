name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Create placeholder assets
        run: |
          mkdir -p assets
          sudo apt-get install -y imagemagick

          convert -size 1024x1024 xc:'#c9a84c' \
            -gravity Center -pointsize 200 \
            -fill white -annotate 0 "M" \
            assets/icon.png

          convert -size 1024x1024 xc:'#070e1a' \
            -gravity Center -pointsize 200 \
            -fill '#c9a84c' -annotate 0 "M" \
            assets/adaptive-icon.png

          convert -size 1284x2778 xc:'#070e1a' \
            -gravity Center -pointsize 200 \
            -fill '#c9a84c' -annotate 0 "MyAstrology" \
            assets/splash.png

          convert -size 48x48 xc:'#c9a84c' assets/favicon.png
          echo "Assets created:" && ls -la assets/

      - name: Build Android APK
        run: eas build --platform android --profile preview --non-interactive
