name: Build Android APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm install

      - name: Create assets & fonts
        run: |
          mkdir -p assets/fonts
          sudo apt-get install -y imagemagick

          # App icon — gold M on dark
          convert -size 1024x1024 \
            -define gradient:angle=135 gradient:'#0d1f35-#070e1a' \
            -gravity Center -fill '#c9a84c' \
            -font DejaVu-Sans-Bold -pointsize 450 \
            -annotate 0 "M" assets/icon.png

          # Adaptive icon
          convert -size 1024x1024 xc:'#070e1a' \
            -gravity Center -fill '#c9a84c' \
            -font DejaVu-Sans-Bold -pointsize 420 \
            -annotate 0 "M" assets/adaptive-icon.png

          # Splash screen
          convert -size 1284x2778 \
            -define gradient:angle=180 gradient:'#0d1f35-#070e1a' \
            -gravity Center -fill '#c9a84c' \
            -font DejaVu-Sans-Bold -pointsize 140 \
            -annotate 0 "MyAstrology" assets/splash.png

          # Favicon
          convert -size 48x48 xc:'#c9a84c' assets/favicon.png

          # Bengali Font download
          curl -fsSL \
            "https://fonts.gstatic.com/s/notoserifbengali/v17/hYkuPvggTvnzteaV7WD65tCMunA6bJ1HIyDL-7M.ttf" \
            -o assets/fonts/NotoSerifBengali-Regular.ttf \
            || echo "Font download failed, continuing..."

          # Bold = Regular (same font, weight handled by fontWeight)
          cp assets/fonts/NotoSerifBengali-Regular.ttf \
             assets/fonts/NotoSerifBengali-Bold.ttf 2>/dev/null || true

          echo "=== Assets created ==="
          ls -lh assets/
          ls -lh assets/fonts/

      - name: Build Android APK
        run: eas build --platform android --profile preview --non-interactive

      - name: Build complete
        run: |
          echo "✅ Build complete!"
          echo "expo.dev → MyAstrology → Builds → Download APK"
